<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC Pizza Wheel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;background:#0a0a0a;color:#fff;font-family:'Space Grotesk',sans-serif;}
  body{display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:32px 16px 48px;}

  .hero{text-align:center;margin-bottom:32px;}
  .hero-title{font-family:'Bebas Neue',sans-serif;font-size:72px;letter-spacing:4px;line-height:0.95;color:#fff;}
  .hero-title span{color:#ff4500;}
  .hero-sub{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:#555;margin-top:8px;}

  .main{display:flex;gap:48px;align-items:flex-start;flex-wrap:wrap;justify-content:center;width:100%;max-width:980px;}

  .wheel-col{display:flex;flex-direction:column;align-items:center;gap:20px;}
  .canvas-wrap{position:relative;width:420px;height:420px;}
  canvas{display:block;}
  .pointer-wrap{position:absolute;top:0;left:50%;transform:translateX(-50%);}
  .pointer-arrow{width:0;height:0;border-left:14px solid transparent;border-right:14px solid transparent;border-top:36px solid #ff4500;margin:0 auto;}
  .pointer-line{width:2px;height:24px;background:#ff4500;margin:0 auto;}

  .spin-btn{background:#ff4500;color:#fff;border:none;font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:4px;padding:18px 72px;border-radius:4px;cursor:pointer;transition:transform 0.1s,background 0.1s;width:100%;}
  .spin-btn:hover{background:#ff5a14;}
  .spin-btn:active{transform:scale(0.97);}
  .spin-btn:disabled{background:#222;color:#444;cursor:not-allowed;}

  .spin-meta{font-size:11px;color:#444;letter-spacing:1.5px;text-transform:uppercase;text-align:center;}

  .right-col{display:flex;flex-direction:column;gap:16px;width:380px;min-width:280px;}

  .result-card{background:#111;border:1px solid #1e1e1e;border-radius:16px;padding:28px;transition:border-color 0.3s;}
  .result-card.active{border-color:#ff4500;}
  .result-eyebrow{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#555;margin-bottom:10px;}
  .result-name{font-family:'Bebas Neue',sans-serif;font-size:42px;line-height:1;color:#fff;margin-bottom:6px;min-height:50px;}
  .result-name.spinning{color:#333;font-size:28px;}
  .result-sub{font-size:12px;color:#444;margin-bottom:20px;}

  .btn-row{display:flex;gap:8px;flex-wrap:wrap;}
  .action-btn{flex:1;padding:10px 16px;border-radius:8px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:1px solid #2a2a2a;background:transparent;color:#888;transition:all 0.2s;white-space:nowrap;}
  .action-btn:hover{border-color:#ff4500;color:#ff4500;}
  .action-btn.primary{background:#ff4500;border-color:#ff4500;color:#fff;}
  .action-btn.primary:hover{background:#ff5a14;}
  .action-btn:disabled{opacity:0.3;cursor:not-allowed;}

  .dist-box{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:10px;padding:14px 16px;font-size:13px;color:#888;line-height:1.6;}
  .dist-box strong{color:#fff;display:block;font-size:15px;margin-bottom:4px;}
  .dist-box .miles{font-family:'Bebas Neue',sans-serif;font-size:36px;color:#ff4500;line-height:1;}
  .dist-box .miles-label{font-size:11px;color:#555;letter-spacing:1px;text-transform:uppercase;}

  .stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .stat-box{background:#111;border:1px solid #1a1a1a;border-radius:10px;padding:12px;text-align:center;}
  .stat-val{font-family:'Bebas Neue',sans-serif;font-size:28px;color:#fff;line-height:1;}
  .stat-lbl{font-size:9px;color:#444;letter-spacing:1.5px;text-transform:uppercase;margin-top:2px;}

  .history{background:#111;border:1px solid #1a1a1a;border-radius:12px;padding:16px;}
  .history-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#444;margin-bottom:12px;}
  .history-list{display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto;}
  .history-item{display:flex;align-items:center;gap:8px;font-size:13px;color:#666;}
  .history-num{font-family:'Bebas Neue',sans-serif;font-size:16px;color:#333;min-width:20px;}
  .history-name{flex:1;}
  .history-item.latest .history-name{color:#ff4500;}
  .history-item.latest .history-num{color:#ff4500;}

  .progress-bar{width:100%;height:3px;background:#1a1a1a;border-radius:2px;overflow:hidden;}
  .progress-fill{height:100%;background:#ff4500;border-radius:2px;transition:width 0.5s;}

  .visited-toggle{display:flex;align-items:center;gap:8px;font-size:12px;color:#555;}
  .visited-toggle input{accent-color:#ff4500;}

  @media(max-width:600px){
    .hero-title{font-size:52px;}
    .canvas-wrap{width:320px;height:320px;}
    .right-col{width:320px;}
    .result-name{font-size:32px;}
    .spin-btn{font-size:26px;padding:16px 40px;}
  }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-title">NYC<br><span>Pizza</span><br>Wheel</div>
  <div class="hero-sub">978 spots across the 5 boroughs</div>
</div>

<div class="main">
  <div class="wheel-col">
    <div class="canvas-wrap">
      <canvas id="wheel" width="420" height="420"></canvas>
      <div class="pointer-wrap" style="top:0;">
        <div class="pointer-line"></div>
        <div class="pointer-arrow"></div>
      </div>
    </div>
    <button class="spin-btn" id="spinBtn" onclick="spin()">SPIN</button>
    <div class="spin-meta" id="spinMeta">tap to pick your next pizza run</div>
  </div>

  <div class="right-col">
    <div class="result-card" id="resultCard">
      <div class="result-eyebrow">Your next run is to...</div>
      <div class="result-name" id="resultName">Waiting for spin</div>
      <div class="result-sub" id="resultSub">Hit spin to pick a pizza spot</div>
      <div class="btn-row" id="btnRow">
        <button class="action-btn" id="locBtn" onclick="getLocation()" disabled>Get distance</button>
        <button class="action-btn primary" id="mapsBtn" onclick="openMaps()" disabled>Open in Maps</button>
      </div>
      <div id="distBox" style="display:none;margin-top:12px;"></div>
    </div>

    <div class="stats-row">
      <div class="stat-box"><div class="stat-val" id="statSpins">0</div><div class="stat-lbl">Spins</div></div>
      <div class="stat-box"><div class="stat-val" id="statVisited">0</div><div class="stat-lbl">Visited</div></div>
      <div class="stat-box"><div class="stat-val" id="statLeft">978</div><div class="stat-lbl">Left</div></div>
    </div>

    <div style="padding:0 2px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
        <span style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#444;">Progress</span>
        <span style="font-size:11px;color:#555;" id="progressPct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>

    <div class="history" id="historyBox" style="display:none;">
      <div class="history-title">Recent spins</div>
      <div class="history-list" id="historyList"></div>
    </div>

    <label class="visited-toggle">
      <input type="checkbox" id="skipVisited" checked>
      Skip already-spun places
    </label>
  </div>
</div>

const SLICE_COUNT = 20;
let angle = 0;
let spinning = false;
let spinCount = 0;
let visited = new Set();
let history = [];
let winner = '';
let winnerPlace = '';
let displayNames = [];
let userLat = null, userLng = null;

const CX = 210, CY = 210, R = 198;

function toRad(d){ return d * Math.PI / 180; }

function shuffleDisplay(){
  const arr = [...PLACES].sort(() => Math.random() - 0.5);
  displayNames = arr.slice(0, SLICE_COUNT);
}

function drawWheel(rot){
  const canvas = document.getElementById('wheel');
  const ctx = canvas.getContext('2d');
  const slice = (2 * Math.PI) / SLICE_COUNT;
  ctx.clearRect(0,0,420,420);

  for(let i = 0; i < SLICE_COUNT; i++){
    const s = rot + i * slice;
    const e = s + slice;
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, R, s, e);
    ctx.closePath();
    ctx.fillStyle = i % 2 === 0 ? '#161616' : '#0e0e0e';
    ctx.fill();
    ctx.strokeStyle = '#0a0a0a';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(s + slice / 2);
    const label = (displayNames[i] || '').substring(0, 22);
    const progress = (i / SLICE_COUNT);
    ctx.fillStyle = i % 2 === 0 ? '#ff4500' : '#555';
    ctx.font = "500 11px 'Space Grotesk', sans-serif";
    ctx.textAlign = 'right';
    ctx.fillText(label.length > 20 ? label.substring(0,19)+'…' : label, R - 10, 4);
    ctx.restore();
  }

  // Outer ring
  ctx.beginPath();
  ctx.arc(CX, CY, R, 0, 2*Math.PI);
  ctx.strokeStyle = '#ff4500';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Tick marks
  for(let i = 0; i < SLICE_COUNT; i++){
    const a = rot + i * (2*Math.PI/SLICE_COUNT);
    ctx.beginPath();
    ctx.moveTo(CX + (R-2)*Math.cos(a), CY + (R-2)*Math.sin(a));
    ctx.lineTo(CX + (R+6)*Math.cos(a), CY + (R+6)*Math.sin(a));
    ctx.strokeStyle = '#ff4500';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Center
  ctx.beginPath();
  ctx.arc(CX, CY, 36, 0, 2*Math.PI);
  ctx.fillStyle = '#0a0a0a';
  ctx.fill();
  ctx.strokeStyle = '#ff4500';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.fillStyle = '#ff4500';
  ctx.font = "700 11px 'Space Grotesk', sans-serif";
  ctx.textAlign = 'center';
  ctx.fillText('NYC', CX, CY + 4);
}

function pickWinner(){
  const skip = document.getElementById('skipVisited').checked;
  const pool = skip ? PLACES.filter((_,i) => !visited.has(i)) : PLACES;
  const available = pool.length > 0 ? pool : PLACES;
  const pick = available[Math.floor(Math.random() * available.length)];
  winner = pick;
  winnerPlace = pick;
  const idx = PLACES.indexOf(pick);
  visited.add(idx);
}

function spin(){
  if(spinning) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('resultCard').classList.remove('active');
  document.getElementById('locBtn').disabled = true;
  document.getElementById('mapsBtn').disabled = true;
  document.getElementById('distBox').style.display = 'none';
  document.getElementById('resultName').textContent = '...';
  document.getElementById('resultName').className = 'result-name spinning';
  document.getElementById('resultSub').textContent = 'spinning...';

  shuffleDisplay();
  pickWinner();

  const extraSpins = 6 + Math.random() * 4;
  const target = angle + extraSpins * 2 * Math.PI + Math.random() * 2 * Math.PI;
  const dur = 4000 + Math.random() * 1500;
  const start = angle;
  const t0 = performance.now();

  function ease(t){ return 1 - Math.pow(1 - t, 4); }

  function frame(now){
    const p = Math.min((now - t0) / dur, 1);
    angle = start + (target - start) * ease(p);
    drawWheel(angle);
    if(p < 1){
      requestAnimationFrame(frame);
    } else {
      spinning = false;
      spinCount++;
      document.getElementById('spinBtn').disabled = false;
      document.getElementById('spinBtn').textContent = 'SPIN AGAIN';

      document.getElementById('resultName').textContent = winner;
      document.getElementById('resultName').className = 'result-name';
      document.getElementById('resultSub').textContent = 'one of 978 NYC pizza spots · time to run!';
      document.getElementById('resultCard').classList.add('active');
      document.getElementById('locBtn').disabled = false;
      document.getElementById('mapsBtn').disabled = false;

      history.unshift(winner);
      if(history.length > 10) history.pop();
      updateStats();
      updateHistory();

      document.getElementById('spinMeta').textContent =
        spinCount + ' spin' + (spinCount !== 1 ? 's' : '') +
        ' · ' + (PLACES.length - visited.size) + ' spots remaining';
    }
  }
  requestAnimationFrame(frame);
}

function updateStats(){
  document.getElementById('statSpins').textContent = spinCount;
  document.getElementById('statVisited').textContent = visited.size;
  document.getElementById('statLeft').textContent = PLACES.length - visited.size;
  const pct = Math.round((visited.size / PLACES.length) * 100);
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
}

function updateHistory(){
  const box = document.getElementById('historyBox');
  const list = document.getElementById('historyList');
  box.style.display = 'block';
  list.innerHTML = history.map((name, i) =>
    '<div class="history-item' + (i === 0 ? ' latest' : '') + '">' +
    '<span class="history-num">' + (i + 1) + '</span>' +
    '<span class="history-name">' + name + '</span>' +
    '</div>'
  ).join('');
}

function getLocation(){
  const btn = document.getElementById('locBtn');
  btn.textContent = 'Locating...';
  btn.disabled = true;
  if(!navigator.geolocation){
    showDist('Geolocation not supported in this browser.', null);
    btn.textContent = 'Not supported';
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos => {
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;
      const distMi = haversine(userLat, userLng, 40.7580, -73.9855);
      showDist(winner, distMi);
      btn.textContent = 'Updated';
      btn.disabled = false;
    },
    err => {
      showDist(winner, null);
      btn.textContent = 'Retry';
      btn.disabled = false;
    }
  );
}

function haversine(lat1, lng1, lat2, lng2){
  const R = 3958.8;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function showDist(name, miles){
  const box = document.getElementById('distBox');
  box.style.display = 'block';
  if(miles !== null){
    const walkMins = Math.round(miles * 20);
    const runMins = Math.round(miles * 10);
    box.innerHTML =
      '<strong>' + name + '</strong>' +
      '<div class="miles">' + miles.toFixed(1) + '</div>' +
      '<div class="miles-label">miles away (approx)</div>' +
      '<div style="margin-top:8px;font-size:12px;color:#555;">' +
      'Walk ~' + walkMins + ' min &nbsp;·&nbsp; Run ~' + runMins + ' min' +
      '</div>';
  } else {
    box.innerHTML = '<strong>' + name + '</strong><div style="color:#555;font-size:13px;margin-top:4px;">Could not get location. Use Maps for directions.</div>';
  }
}

function openMaps(){
  const q = encodeURIComponent(winner + ' pizza New York City');
  window.open('https://www.google.com/maps/search/' + q, '_blank');
}
